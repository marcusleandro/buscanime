name: "Build application"
description: "Install dependencies, build for production, and upload the dist artifact"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: yarn

    - name: Install dependencies
      shell: bash
      run: yarn install --frozen-lockfile

    - name: Build
      shell: bash
      run: yarn build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist
        retention-days: 1
